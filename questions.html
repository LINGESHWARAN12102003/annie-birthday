<!DOCTYPE html>
<html>
<head>

<title>Love Questions</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body class="bg">

<div class="container text-center">

<h1 class="mt-5">❤️ Answer These Questions</h1>

<div class="card p-4 shadow question-box">

<div id="question"></div>

<div id="options"></div>

<p id="result"></p>

<p id="score"></p>

<a href="future.html" id="nextPage"
class="btn btn-danger mt-3"
style="display:none;">
Next Page ➜
</a>

</div>

</div>

<script>

let questions = [

{question:"When did we first meet?",
options:["OCT 20 2021","DEC 3 2021","DEC 22 2021"],
answer:"OCT 20 2021"},

{question:"when did you love me",
options:["NOV 22 2024","DEC 3 2024","MARCH 14 2025"],
answer:"MARCH 14 2025"},

{question:"HOW MUCH AMOUNT WE PLANNED FOR OUR LIFE",
options:["3 CRORE","10 CRORE","7 CRORE"],
answer:"7 CRORE"},

{question:"DID YOUR MOM KNOW THAT WE ARE LOVING EACH OTHER",
options:["Yes ❤️","No"],
answer:"Yes ❤️"}


];

let current = 0;
let score = 0;
let firstAttempt = true;

function loadQuestion(){

firstAttempt = true;

let q = questions[current];

document.getElementById("question").innerHTML =
"<h4>"+q.question+"</h4>";

let buttons = "";

q.options.forEach(o=>{
buttons += `<button class="btn btn-outline-dark m-2"
onclick="checkAnswer('${o}')">${o}</button>`;
});

document.getElementById("options").innerHTML = buttons;

}

function checkAnswer(selected){

let correct = questions[current].answer;

if(selected === correct){

if(firstAttempt) score++;

document.getElementById("result").innerHTML =
"<span class='correct'>✔ Correct</span>";

setTimeout(()=>{

current++;

if(current < questions.length){

loadQuestion();

}else{

document.getElementById("question").innerHTML =
"🎉 Quiz Finished";

document.getElementById("options").innerHTML = "";

document.getElementById("score").innerHTML =
"Your Score (First Attempt): "
+score+" / "+questions.length;

document.getElementById("nextPage").style.display="block";

}

},1000);

}else{

firstAttempt=false;

document.getElementById("result").innerHTML =
"<span class='wrong'>❌ Try Again</span>";

}

}

loadQuestion();

</script>

</body>
</html>
